      <g transform="translate(110,140)">
        <rect x="6" y="2" width="26" height="44" rx="5"/>
        <path d="M15 40 H23"/>
      </g>

      <!-- price tag -->
      <g transform="translate(150,250)">
        <path d="M4 4 H28 L48 24 L28 44 H4 Z"/>
        <circle cx="14" cy="14" r="3"/>
      </g>

      <!-- car (repeat, offset) -->
      <g transform="translate(270,290)">
        <path d="M4 24 L10 8 H42 L48 24 V34 H4 Z"/>
        <circle cx="14" cy="34" r="5"/>
        <circle cx="38" cy="34" r="5"/>
      </g>
    </g>

