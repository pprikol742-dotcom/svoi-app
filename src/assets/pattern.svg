<svg width="360" height="360" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">

    <g stroke="#1F3A3D" opacity="0.09">
      <!-- car -->
      <g transform="translate(20,30)">
        <path d="M4 24 L10 8 H42 L48 24 V34 H4 Z" />
        <circle cx="14" cy="34" r="5"/>
        <circle cx="38" cy="34" r="5"/>
        <path d="M10 24 H42"/>
      </g>

      <!-- house -->
      <g transform="translate(200,10)">
        <path d="M2 26 L26 6 L50 26"/>
        <path d="M10 22 V48 H42 V22"/>
        <rect x="22" y="32" width="8" height="16"/>
      </g>

      <!-- sofa -->
      <g transform="translate(240,150)">
        <path d="M4 30 V18 a6 6 0 0 1 6-6 H44 a6 6 0 0 1 6 6 V30"/>
        <path d="M0 30 H54 V44 H0 Z"/>
        <path d="M4 44 V50 M50 44 V50"/>
      </g>

      <!-- wrench -->
      <g transform="translate(30,220)">
        <path d="M6 46 L28 24"/>
